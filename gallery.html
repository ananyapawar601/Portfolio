      HOW TO ADD PHOTOS:
      1. Create a folder: assets/gallery/singapore/
      2. Put your photos in it
      3. Replace the <span class="album-thumb-placeholder"> with:
         <img src="assets/gallery/singapore/cover.jpg" alt="Singapore">
      4. Update album-meta with the year or a short note

      Each album card links to its own page (e.g. gallery-singapore.html)
      which you can build later. For now they all link to #.
    -->
